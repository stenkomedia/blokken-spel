<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Blokken</title>
    <style>
        body {
            background-color: #202028;
            color: #fff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { margin: 0 0 5px 0; font-size: 28px; }
        p.subtitle { margin: 0 0 20px 0; color: #aaa; font-size: 15px; }
        
        #game-container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }
        
        /* LINKERKANT: Top 10 */
        .leaderboard-box {
            background: #282830;
            border: 2px solid #444;
            padding: 15px;
            border-radius: 8px;
            min-width: 180px;
            box-sizing: border-box;
        }
        .leaderboard-title {
            font-size: 15px;
            font-weight: bold;
            color: #ffcc00;
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #444;
            padding-bottom: 5px;
        }
        .leaderboard-list { list-style: none; padding: 0; margin: 0; font-size: 14px; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .leaderboard-item:nth-child(1) { color: #ffcc00; font-weight: bold; }

        /* MIDDEN: Het Speelveld */
        #speelveld-wrapper { position: relative; }
        #speelveld {
            width: 300px;
            height: 600px;
            background-color: #111;
            border: 3px solid #fff;
            position: relative;
            overflow: hidden;
        }
        .block {
            width: 30px;
            height: 30px;
            position: absolute;
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.15);
        }
        
        /* RECHTERKANT: Score & Knoppen */
        .sidebar { display: flex; flex-direction: column; gap: 12px; }
        .score-box {
            background: #333;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            min-width: 150px;
        }
        .score-label { font-size: 11px; color: #bbb; }
        .score-val { font-size: 24px; font-weight: bold; margin-top: 5px; }
        #score { color: #00ffcc; }
        #highscore { color: #ffcc00; }
        
        #next-box {
            width: 140px; 
            height: 140px; 
            background: #111; 
            border: 2px solid #555; 
            border-radius: 6px;
            margin: 5px auto 0 auto; 
            position: relative;
            overflow: hidden;
        }
        .next-block {
            width: 30px;
            height: 30px;
            position: absolute;
            box-sizing: border-box;
            border: 1px solid rgba(0,0,0,0.15);
        }

        .btn {
            color: white; border: none; padding: 12px; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer; width: 100%;
        }
        #pause-btn { background-color: #ff3366; }
        #restart-btn { background-color: #3877ff; }

        #game-over-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 10; display: none;
        }
        #game-over-screen h2 { color: #ff3366; margin: 0 0 10px 0; }
        #name-input { padding: 8px; font-size: 16px; border-radius: 5px; border: none; margin-bottom: 10px; text-align: center; width: 160px; }
        .save-btn { background: #00ffcc; color: #202028; border: none; padding: 10px; font-weight: bold; border-radius: 5px; cursor: pointer; }

        #controls {
            margin-top: 25px; font-size: 14px; color: #aaa; text-align: center;
            max-width: 700px; background: rgba(255,255,255,0.05); padding: 12px; border-radius: 6px;
        }
    </style>
</head>
<body>

    <h1>Blokken</h1>
    <p class="subtitle">Geen levels • Constante snelheid</p>

    <div id="game-container">
        <div class="leaderboard-box">
            <div class="leaderboard-title">🏆 TOP 10 SCORES</div>
            <ol id="leaderboard" class="leaderboard-list"></ol>
        </div>

        <div id="speelveld-wrapper">
            <div id="speelveld"></div>
            <div id="game-over-screen">
                <h2>GAME OVER</h2>
                <p>Score: <span id="final-score" style="color:#00ffcc; font-weight:bold;">0</span></p>
                <input type="text" id="name-input" placeholder="Je naam" maxlength="10">
                <button class="save-btn" onclick="submitScore()">OPSLAAN & RESTART</button>
            </div>
        </div>

        <div class="sidebar">
            <div class="score-box">
                <div class="score-label">PUNTEN</div>
                <div id="score" class="score-val">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">HIGHSCORE</div>
                <div id="highscore" class="score-val">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">VOLGEND BLOKJE</div>
                <div id="next-box"></div>
            </div>
            <button id="pause-btn" class="btn" onclick="togglePause()">PAUZE</button>
            <button id="restart-btn" class="btn" onclick="resetGame()">HERSTART</button>
        </div>
    </div>

    <div id="controls">
        <strong>Besturing:</strong> Pijltjestoetsen links/rechts = Bewegen | Omhoog = Draaien | Omlaag = Versnellen | Spatiebalk = Hard Drop
    </div>

<script>
const COLS = 10, ROWS = 20, BLOCK_SIZE = 30;
const colors = [null, '#FF0D72', '#0DC2FF', '#0DFF72', '#F538FF', '#FF8E0D', '#FFE138', '#3877FF'];
const pieces = {
    'T': [[0,0,0],[1,1,1],[0,1,0]], 'O': [[2,2],[2,2]], 'L': [[0,3,0],[0,3,0],[0,3,3]],
    'J': [[0,4,0],[0,4,0],[4,4,0]], 'I': [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]],
    'S': [[0,6,6],[6,6,0],[0,0,0]], 'Z': [[7,7,0],[0,7,7],[0,0,0]]
};

let arena = Array.from({length: ROWS}, () => Array(COLS).fill(0));
let player = { pos: {x: 0, y: 0}, matrix: null };
let score = 0, highscore = 0, isPaused = false, gameOver = false, nextPieceType = 'I';

// HIER WORDT DE DATABASE INGESTELD (LOKAAL IN DE BROWSER)
let tempLeaderboard = JSON.parse(localStorage.getItem('tetrisScores')) || [];

function loadLeaderboard() {
    tempLeaderboard.sort((a,b) => b.score - a.score);
    if (tempLeaderboard.length > 10) tempLeaderboard = tempLeaderboard.slice(0, 10);

    let html = "";
    for(let i=0; i<10; i++) {
        if(tempLeaderboard[i]) html += `<li class="leaderboard-item"><span>${i+1}. ${tempLeaderboard[i].name}</span><strong>${tempLeaderboard[i].score}</strong></li>`;
        else html += `<li class="leaderboard-item"><span style="color:#555;">${i+1}. ---</span><strong style="color:#555;">0</strong></li>`;
    }
    document.getElementById('leaderboard').innerHTML = html;

    if (tempLeaderboard[0]) {
        highscore = tempLeaderboard[0].score;
        document.getElementById('highscore').innerText = highscore;
    }
}

function draw() {
    const field = document.getElementById('speelveld');
    field.innerHTML = "";
    
    arena.forEach((row, y) => {
        row.forEach((val, x) => {
            if(val !== 0) createBlockDiv(x, y, colors[val], field);
        });
    });
    
    if(player.matrix && !gameOver) {
        player.matrix.forEach((row, y) => {
            row.forEach((val, x) => {
                if(val !== 0) createBlockDiv(player.pos.x + x, player.pos.y + y, colors[val], field);
            });
        });
    }
}

function createBlockDiv(x, y, color, parent) {
    const div = document.createElement('div');
    div.className = 'block';
    div.style.backgroundColor = color;
    div.style.left = (x * BLOCK_SIZE) + 'px';
    div.style.top = (y * BLOCK_SIZE) + 'px';
    parent.appendChild(div);
}

function drawNext() {
    const box = document.getElementById('next-box');
    box.innerHTML = "";
    const matrix = pieces[nextPieceType];
    
    const size = 30;
    const offsetX = (140 - (matrix[0].length * size)) / 2;
    const offsetY = (140 - (matrix.length * size)) / 2;

    matrix.forEach((row, y) => {
        row.forEach((val, x) => {
            if(val !== 0) {
                const div = document.createElement('div');
                div.className = 'next-block';
                div.style.backgroundColor = colors[val];
                div.style.left = (x * size + offsetX) + 'px';
                div.style.top = (y * size + offsetY) + 'px';
                box.appendChild(div);
            }
        });
    });
}

function collide(arena, player) {
    const m = player.matrix, o = player.pos;
    for(let y=0; y<m.length; ++y) {
        for(let x=0; x<m[y].length; ++x) {
            if(m[y][x] !== 0) {
                if(!arena[y+o.y] || arena[y+o.y][x+o.x] === undefined || arena[y+o.y][x+o.x] !== 0) return true;
            }
        }
    }
    return false;
}

function merge(arena, player) {
    player.matrix.forEach((row, y) => {
        row.forEach((val, x) => {
            if(val !== 0) arena[y+player.pos.y][x+player.pos.x] = val;
        });
    });
}

function arenaSweep() {
    let linesCleared = 0;
    for(let y=arena.length-1; y>=0; --y) {
        if(arena[y].every(val => val !== 0)) {
            arena.splice(y, 1);
            arena.unshift(Array(COLS).fill(0));
            y++;
            linesCleared++;
        }
    }
    if(linesCleared === 1) score += 40;
    else if(linesCleared === 2) score += 100;
    else if(linesCleared === 3) score += 300;
    else if(linesCleared === 4) score += 1200;
    
    document.getElementById('score').innerText = score;
}

function playerDrop() {
    if(isPaused || gameOver) return;
    player.pos.y++;
    if(collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        arenaSweep();
        playerReset();
    }
    draw();
}

function playerHardDrop() {
    if(isPaused || gameOver) return;
    while(!collide(arena, player)) { player.pos.y++; }
    player.pos.y--;
    merge(arena, player);
    arenaSweep();
    playerReset();
    draw();
}

function playerMove(dir) {
    if(isPaused || gameOver) return;
    player.pos.x += dir;
    if(collide(arena, player)) player.pos.x -= dir;
    draw();
}

function playerRotate() {
    if(isPaused || gameOver) return;
    const matrix = player.matrix;
    for(let y=0; y<matrix.length; ++y) {
        for(let x=0; x<y; ++x) { [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]; }
    }
    matrix.forEach(row => row.reverse());
    if(collide(arena, player)) {
        matrix.forEach(row => row.reverse());
        for(let y=0; y<matrix.length; ++y) {
            for(let x=0; x<y; ++x) { [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]]; }
        }
    }
    draw();
}

function playerReset() {
    const types = 'ILJOTSZ';
    player.matrix = pieces[nextPieceType];
    player.pos.y = 0;
    player.pos.x = (COLS / 2 | 0) - (player.matrix[0].length / 2 | 0);
    
    nextPieceType = types[types.length * Math.random() | 0];
    drawNext();

    if(collide(arena, player)) {
        gameOver = true;
        document.getElementById('final-score').innerText = score;
        document.getElementById('game-over-screen').style.display = 'flex';
    }
}

// OPSLAAN IN DE DATABASE
window.submitScore = function() {
    const name = document.getElementById('name-input').value.trim() || "Anoniem";
    if(score > 0) {
        tempLeaderboard.push({name, score});
        localStorage.setItem('tetrisScores', JSON.stringify(tempLeaderboard));
    }
    resetGame();
    loadLeaderboard();
}

window.resetGame = function() {
    arena.forEach(row => row.fill(0));
    score = 0; gameOver = false; isPaused = false;
    document.getElementById('score').innerText = 0;
    document.getElementById('game-over-screen').style.display = 'none';
    document.getElementById('pause-btn').innerText = "PAUZE";
    playerReset();
    draw();
}

window.togglePause = function() {
    if(gameOver) return;
    isPaused = !isPaused;
    document.getElementById('pause-btn').innerText = isPaused ? "VERDER" : "PAUZE";
}

document.addEventListener('keydown', e => {
    if([32, 37, 38, 39, 40].includes(e.keyCode)) e.preventDefault();
    if(e.keyCode === 37) playerMove(-1);
    if(e.keyCode === 39) playerMove(1);
    if(e.keyCode === 40) playerDrop();
    if(e.keyCode === 38) playerRotate();
    if(e.keyCode === 32) playerHardDrop();
});

playerReset();
loadLeaderboard();
draw();
setInterval(playerDrop, 1000);
</script>
</body>
</html>
